name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

# Grants the workflow permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one active deployment runner at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular Application
        run: pnpm build

      - name: Copy index.html to 404.html (Resolves SPA routing refreshes)
        run: cp dist/denizetkar.github.io/browser/index.html dist/denizetkar.github.io/browser/404.html

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/denizetkar.github.io/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
